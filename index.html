<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ポーズ人形</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-viewport: #2c2824;
    --bg-ground: #3a332c;
    --bg-panel: #777777;
    --ink: #3a332c;
    --ink-soft: #8a7f73;
    --accent: #c1633c;
    --line: #e2d8c8;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin: 0;
    height: 100%;
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
    background: var(--bg-viewport);
    color: var(--ink);
    overscroll-behavior: none;
  }
  #app{
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }
  #viewport{
    position: relative;
    flex: 1 1 46%;
    min-height: 220px;
    background: var(--bg-viewport);
    overflow: hidden;
  }
  #c{
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  #loading{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    letter-spacing: 0.1em;
    background: var(--bg-viewport);
    transition: opacity 0.3s;
  }
  #loading.hidden{
    opacity: 0;
    pointer-events: none;
  }
  .hint{
    position: absolute;
    left: 12px;
    bottom: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .view-buttons{
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
  }
  .view-buttons button, .reset-btn, .bottom-buttons button{
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #f6f1e8;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    backdrop-filter: blur(4px);
  }
  .view-buttons button:active, .reset-btn:active, .bottom-buttons button:active{
    background: rgba(255,255,255,0.25);
  }
  .view-buttons button.active, .bottom-buttons button.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .bottom-buttons{
    position: absolute;
    right: 10px;
    bottom: 10px;
    display: flex;
    gap: 6px;
  }
  .fisheye-strength-row{
    position: absolute;
    right: 10px;
    bottom: 46px;
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 6px 12px;
    backdrop-filter: blur(4px);
  }
  .fisheye-strength-row span{
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
  }
  .fisheye-strength-row input[type=range]{
    width: 110px;
    margin: 0;
  }
  #app.fullscreen #panel{
    display: none;
  }
  #app.fullscreen #viewport{
    flex: 1 1 100%;
  }
  .reset-btn{
    position: absolute;
    top: 10px;
    left: 10px;
  }
  #panel{
    flex: 1 1 54%;
    overflow-y: auto;
    background: var(--bg-panel);
    padding: 14px 16px 28px;
    -webkit-overflow-scrolling: touch;
  }
  #panel h1{
    font-size: 15px;
    font-weight: 700;
    margin: 2px 0 12px;
    letter-spacing: 0.04em;
  }
  #panel h1 span{
    color: var(--accent);
  }
  details{
    border-bottom: 1px solid var(--line);
  }
  details:last-of-type{
    border-bottom: none;
    margin-bottom: 0;
  }
  summary{
    list-style: none;
    cursor: pointer;
    padding: 11px 2px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--ink);
  }
  summary::-webkit-details-marker{ display: none; }
  summary::after{
    content: '+';
    color: var(--ink-soft);
    font-weight: 400;
    font-size: 16px;
  }
  details[open] summary::after{
    content: '−';
  }
  .row{
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 7px 2px 11px;
  }
  .row .row-label{
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .row .row-label b{
    color: var(--ink);
    font-weight: 500;
  }
  input[type=range]{
    width: 100%;
    accent-color: var(--accent);
    margin: 2px 0;
  }
  .note{
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.6;
    padding: 10px 2px 2px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <canvas id="c"></canvas>
    <div id="loading">読み込み中…</div>
    <button class="reset-btn" id="resetBtn">姿勢をリセット</button>
    <div class="view-buttons">
      <button data-view="front">正面</button>
      <button data-view="side">側面</button>
      <button data-view="back">背面</button>
    </div>
    <div class="hint">ドラッグで回転・2本指で拡大縮小&amp;移動</div>
    <div class="fisheye-strength-row" id="fisheyeStrengthRow">
      <span>魚眼の強さ</span>
      <input type="range" id="fisheyeStrength" min="100" max="170" step="5" value="145">
    </div>
    <div class="bottom-buttons">
      <button id="fisheyeBtn">魚眼</button>
      <button id="fullscreenBtn">全画面</button>
    </div>
  </div>

  <div id="panel">
    <h1>ポーズ<span>人形</span> <small style="font-size:11px; color:var(--ink-soft); font-weight:400;">(試作・調整中)</small></h1>
    <div id="controls"></div>
    <p class="note">※関節の曲がる方向・範囲は試作段階。動きが不自然な箇所があれば教えてください。</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
  const canvas = document.getElementById('c');
  const viewport = document.getElementById('viewport');
  const loadingEl = document.getElementById('loading');

  // ---------- scene / camera / renderer ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2c2824);

  const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 50);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // ---------- fisheye post-processing (true equidistant circular fisheye) ----------
  // 仕組み: 広いFOVで普通に(矩形透視投影で)レンダリングしたものを、
  // 「出力ピクセルの画面中心からの距離 ∝ 視野角」という魚眼レンズの投影法則に基づいて
  // 再サンプリングする。これにより、直線が丸く湾曲する・周辺が円形にビネットされる、
  // という本物の魚眼レンズらしい見た目になる(単なる中心膨張の歪みではない)。
  const fisheyeTarget = new THREE.WebGLRenderTarget(1, 1);
  const fisheyeScene = new THREE.Scene();
  const fisheyeCamera = new THREE.Camera();
  const fisheyeUniforms = {
    tDiffuse: { value: fisheyeTarget.texture },
    uResolution: { value: new THREE.Vector2(1, 1) },
    uTanHalfFovY: { value: 1 },
    uCamAspect: { value: 1 },
    uMaxAngle: { value: 1 },
  };
  const fisheyeMaterial = new THREE.ShaderMaterial({
    uniforms: fisheyeUniforms,
    vertexShader: `
      varying vec2 vUv;
      void main(){
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform vec2 uResolution;
      uniform float uTanHalfFovY;
      uniform float uCamAspect;
      uniform float uMaxAngle;
      varying vec2 vUv;
      void main(){
        vec2 ndc = vUv * 2.0 - 1.0;
        float minDim = min(uResolution.x, uResolution.y);
        vec2 p = ndc * (uResolution / minDim); // 画面の短い辺に円が内接するように正規化
        float r = length(p);
        if (r > 1.0) { gl_FragColor = vec4(0.0,0.0,0.0,1.0); return; }

        float theta = r * uMaxAngle;       // 中心からの角度(等距離射影)
        float phi = atan(p.y, p.x);
        vec3 dir = vec3(sin(theta)*cos(phi), sin(theta)*sin(phi), -cos(theta));

        float tanHalfFovX = uTanHalfFovY * uCamAspect;
        float xNdc = dir.x / (-dir.z) / tanHalfFovX;
        float yNdc = dir.y / (-dir.z) / uTanHalfFovY;
        if (abs(xNdc) > 1.0 || abs(yNdc) > 1.0) { gl_FragColor = vec4(0.0,0.0,0.0,1.0); return; }

        vec2 uv = vec2(xNdc, yNdc) * 0.5 + 0.5;
        vec3 color = texture2D(tDiffuse, uv).rgb;
        float edge = smoothstep(0.96, 1.0, r); // 円のフチを少しだけ滑らかに暗く
        color = mix(color, vec3(0.0), edge);
        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });
  fisheyeScene.add(new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), fisheyeMaterial));

  function updateFisheyeUniforms(){
    const tanHalfFovY = Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2);
    const tanHalfFovX = tanHalfFovY * camera.aspect;
    const halfFovY = Math.atan(tanHalfFovY);
    const halfFovX = Math.atan(tanHalfFovX);
    fisheyeUniforms.uTanHalfFovY.value = tanHalfFovY;
    fisheyeUniforms.uCamAspect.value = camera.aspect;
    fisheyeUniforms.uMaxAngle.value = Math.min(halfFovY, halfFovX) * 0.96;
  }

  function resize(){
    const w = viewport.clientWidth;
    const h = viewport.clientHeight;
    const pr = Math.min(window.devicePixelRatio || 1, 2);
    renderer.setPixelRatio(pr);
    renderer.setSize(w, h, false);
    fisheyeTarget.setSize(w * pr, h * pr);
    fisheyeUniforms.uResolution.value.set(w * pr, h * pr);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    updateFisheyeUniforms();
  }
  window.addEventListener('resize', resize);


  // ---------- lights ----------
  const hemi = new THREE.HemisphereLight(0x9fb3c8, 0x35302a, 0.6);
  scene.add(hemi);

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.3);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(1024, 1024);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 8;
  keyLight.shadow.camera.left = -2;
  keyLight.shadow.camera.right = 2;
  keyLight.shadow.camera.top = 2.5;
  keyLight.shadow.camera.bottom = -1;
  keyLight.shadow.bias = -0.002;
  scene.add(keyLight);
  scene.add(keyLight.target);

  const TARGET_Y = 0.85; // モデルの中心あたりの高さ

  let lightAzimuth = 45;
  let lightElevation = 55;
  function updateLight(){
    const az = THREE.MathUtils.degToRad(lightAzimuth);
    const el = THREE.MathUtils.degToRad(lightElevation);
    const r = 3.2;
    keyLight.position.set(
      r * Math.cos(el) * Math.sin(az),
      TARGET_Y + r * Math.sin(el),
      r * Math.cos(el) * Math.cos(az)
    );
    keyLight.target.position.set(0, TARGET_Y, 0);
  }
  updateLight();

  // ---------- ground ----------
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(2.4, 48),
    new THREE.MeshStandardMaterial({ color: 0x3a332c, roughness: 1 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ---------- model root ----------
  const root = new THREE.Group();
  scene.add(root);

  // ---------- camera orbit (manual) ----------
  const camTarget = new THREE.Vector3(0, TARGET_Y, 0);
  let camRadius = 2.6;
  let camTheta = 0.55;
  let camPhi = 1.25;
  let minCamRadius = 1.0;

  function updateCamera(){
    const x = camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
    const y = camTarget.y + camRadius * Math.cos(camPhi);
    const z = camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
    camera.position.set(x, y, z);
    camera.lookAt(camTarget);
  }

  const pointers = {};
  let pinchDist = null;
  let pinchMid = null;

  function panCamera(dxPixels, dyPixels){
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const worldUp = new THREE.Vector3(0, 1, 0);
    const right = new THREE.Vector3().crossVectors(dir, worldUp).normalize();
    const up = new THREE.Vector3().crossVectors(right, dir).normalize();
    const panScale = camRadius * 0.0016;
    camTarget.addScaledVector(right, -dxPixels * panScale);
    camTarget.addScaledVector(up, dyPixels * panScale);
  }

  canvas.addEventListener('pointerdown', (e) => {
    canvas.setPointerCapture(e.pointerId);
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    if (Object.keys(pointers).length === 2) {
      pinchDist = null;
      pinchMid = null;
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!pointers[e.pointerId]) return;
    const ids = Object.keys(pointers);

    if (ids.length === 1) {
      const p = pointers[e.pointerId];
      const dx = e.clientX - p.x;
      const dy = e.clientY - p.y;
      camTheta -= dx * 0.006;
      camPhi -= dy * 0.006;
      camPhi = Math.max(0.18, Math.min(Math.PI - 0.18, camPhi));
      updateCamera();
    } else if (ids.length === 2) {
      pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
      const [a, b] = ids.map((id) => pointers[id]);
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };

      if (pinchDist !== null) {
        camRadius *= pinchDist / dist;
        camRadius = Math.max(minCamRadius, Math.min(5.0, camRadius));
      }
      if (pinchMid !== null) {
        panCamera(mid.x - pinchMid.x, mid.y - pinchMid.y);
      }
      updateCamera();

      pinchDist = dist;
      pinchMid = mid;
      return;
    }
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  });

  function releasePointer(e){
    delete pointers[e.pointerId];
    if (Object.keys(pointers).length < 2) {
      pinchDist = null;
      pinchMid = null;
    }
  }
  canvas.addEventListener('pointerup', releasePointer);
  canvas.addEventListener('pointercancel', releasePointer);
  canvas.addEventListener('pointerleave', releasePointer);

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    camRadius += e.deltaY * 0.0015 * camRadius;
    camRadius = Math.max(minCamRadius, Math.min(5.0, camRadius));
    updateCamera();
  }, { passive: false });

  document.querySelectorAll('.view-buttons button').forEach((btn) => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.view;
      if (v === 'front') { camTheta = 0; camPhi = 1.25; }
      if (v === 'side')  { camTheta = Math.PI / 2; camPhi = 1.25; }
      if (v === 'back')  { camTheta = Math.PI; camPhi = 1.25; }
      camRadius = 2.6;
      updateCamera();
    });
  });

  // ================================================================
  // ポーズ設定: VRoidのボーン名(J_Bip_...)に対して、
  // 「レスト姿勢からの追加回転」をスライダーで指定する。
  // sign は回転方向の正負を調整するための係数(試作段階)。
  // ================================================================
  const poseControls = [
    { bone: 'J_Bip_C_Spine',    axis: 'x', sign:  1, min: -30, max: 45,  label: '上半身を前後に曲げる', group: '体幹・首' },
    { bone: 'J_Bip_C_Chest',    axis: 'y', sign:  1, min: -45, max: 45,  label: '上半身をねじる',       group: '体幹・首' },
    { bone: 'J_Bip_C_Spine',    axis: 'z', sign:  1, min: -30, max: 30,  label: '上半身を左右に傾ける', group: '体幹・首' },
    { bone: 'J_Bip_C_Neck',     axis: 'x', sign:  1, min: -30, max: 30,  label: '首を前後に曲げる',     group: '体幹・首' },
    { bone: 'J_Bip_C_Neck',     axis: 'y', sign:  1, min: -60, max: 60,  label: '首を左右に向ける',     group: '体幹・首' },
    { bone: 'J_Bip_C_Neck',     axis: 'z', sign:  1, min: -30, max: 30,  label: '首を傾げる',           group: '体幹・首' },

    // Tポーズ(腕が水平に伸びた状態)が基準(0°)。
    // 上げ下げ: 0°=Tポーズ(水平), -90°=腕を体側に下ろす, +90°=腕を真上に上げる
    { bone: 'J_Bip_L_UpperArm', axis: 'x', sign:  1, min: -90, max: 120, label: '左腕を前後に振る',   group: '左腕' },
    { bone: 'J_Bip_L_UpperArm', axis: 'z', sign:  1, min: -100, max: 100, label: '左腕を上げ下げ',     group: '左腕' },
    { bone: 'J_Bip_L_UpperArm', axis: 'y', sign:  1, min: -90, max: 90,  label: '左腕を回す',         group: '左腕' },
    { bone: 'J_Bip_L_LowerArm', axis: 'x', sign:  1, min: 0,   max: 145, label: '左肘を曲げる',       group: '左腕' },

    { bone: 'J_Bip_R_UpperArm', axis: 'x', sign:  1, min: -90, max: 120, label: '右腕を前後に振る',   group: '右腕' },
    { bone: 'J_Bip_R_UpperArm', axis: 'z', sign: -1, min: -100, max: 100, label: '右腕を上げ下げ',     group: '右腕' },
    { bone: 'J_Bip_R_UpperArm', axis: 'y', sign:  1, min: -90, max: 90,  label: '右腕を回す',         group: '右腕' },
    { bone: 'J_Bip_R_LowerArm', axis: 'x', sign:  1, min: 0,   max: 145, label: '右肘を曲げる',       group: '右腕' },

    { bone: 'J_Bip_L_UpperLeg', axis: 'x', sign:  1, min: -60, max: 100, label: '左脚を前後に振る',   group: '左脚' },
    { bone: 'J_Bip_L_UpperLeg', axis: 'z', sign:  1, min: -10, max: 45,  label: '左脚を横に開く',     group: '左脚' },
    { bone: 'J_Bip_L_LowerLeg', axis: 'x', sign: -1, min: 0,   max: 150, label: '左膝を曲げる',       group: '左脚' },

    { bone: 'J_Bip_R_UpperLeg', axis: 'x', sign:  1, min: -60, max: 100, label: '右脚を前後に振る',   group: '右脚' },
    { bone: 'J_Bip_R_UpperLeg', axis: 'z', sign: -1, min: -10, max: 45,  label: '右脚を横に開く',     group: '右脚' },
    { bone: 'J_Bip_R_LowerLeg', axis: 'x', sign: -1, min: 0,   max: 150, label: '右膝を曲げる',       group: '右脚' },
  ];

  const groupOrder = ['体幹・首', '左腕', '右腕', '左脚', '右脚'];
  const controlsRoot = document.getElementById('controls');
  const sliderEls = [];

  // ボーンごとの delta (degrees) と参照、レスト姿勢クォータニオン
  const boneDelta = {};
  const boneRefs = {};
  const restQuat = {};

  poseControls.forEach((c) => {
    if (!boneDelta[c.bone]) boneDelta[c.bone] = { x: 0, y: 0, z: 0 };
  });

  function applyBonePose(name){
    const bone = boneRefs[name];
    const rest = restQuat[name];
    if (!bone || !rest) return;
    const d = boneDelta[name];
    const e = new THREE.Euler(
      THREE.MathUtils.degToRad(d.x),
      THREE.MathUtils.degToRad(d.y),
      THREE.MathUtils.degToRad(d.z),
      'XYZ'
    );
    const q = new THREE.Quaternion().setFromEuler(e);
    bone.quaternion.copy(rest).multiply(q);
  }

  groupOrder.forEach((groupName, gi) => {
    const details = document.createElement('details');
    if (gi === 0) details.open = true;

    const summary = document.createElement('summary');
    summary.textContent = groupName;
    details.appendChild(summary);

    poseControls.filter(c => c.group === groupName).forEach((c) => {
      const row = document.createElement('div');
      row.className = 'row';

      const labelRow = document.createElement('div');
      labelRow.className = 'row-label';
      const labelText = document.createElement('span');
      labelText.innerHTML = '<b>' + c.label + '</b>';
      const valueText = document.createElement('span');
      valueText.textContent = '0°';
      labelRow.appendChild(labelText);
      labelRow.appendChild(valueText);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = c.min;
      input.max = c.max;
      input.step = 1;
      input.value = 0;

      input.addEventListener('input', () => {
        const deg = Number(input.value);
        boneDelta[c.bone][c.axis] = deg * c.sign;
        valueText.textContent = deg + '°';
        applyBonePose(c.bone);
      });

      sliderEls.push(input);

      row.appendChild(labelRow);
      row.appendChild(input);
      details.appendChild(row);
    });

    controlsRoot.appendChild(details);
  });

  // light controls section
  {
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = '光のあたる方向';
    details.appendChild(summary);

    const lightControls = [
      { get: () => lightAzimuth, set: v => lightAzimuth = v, min: 0, max: 360, label: '光の向き(左右)' },
      { get: () => lightElevation, set: v => lightElevation = v, min: 5, max: 85, label: '光の高さ' },
    ];

    lightControls.forEach((c) => {
      const row = document.createElement('div');
      row.className = 'row';

      const labelRow = document.createElement('div');
      labelRow.className = 'row-label';
      const labelText = document.createElement('span');
      labelText.innerHTML = '<b>' + c.label + '</b>';
      const valueText = document.createElement('span');
      valueText.textContent = c.get() + '°';
      labelRow.appendChild(labelText);
      labelRow.appendChild(valueText);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = c.min;
      input.max = c.max;
      input.step = 1;
      input.value = c.get();

      input.addEventListener('input', () => {
        const v = Number(input.value);
        c.set(v);
        valueText.textContent = v + '°';
        updateLight();
      });

      row.appendChild(labelRow);
      row.appendChild(input);
      details.appendChild(row);
    });

    // 光の強さ(明暗のコントラスト)
    {
      const row = document.createElement('div');
      row.className = 'row';

      const labelRow = document.createElement('div');
      labelRow.className = 'row-label';
      const labelText = document.createElement('span');
      labelText.innerHTML = '<b>光の強さ</b>';
      const valueText = document.createElement('span');
      valueText.textContent = keyLight.intensity.toFixed(1);
      labelRow.appendChild(labelText);
      labelRow.appendChild(valueText);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = 0.3;
      input.max = 3.0;
      input.step = 0.1;
      input.value = keyLight.intensity;

      input.addEventListener('input', () => {
        const v = Number(input.value);
        keyLight.intensity = v;
        valueText.textContent = v.toFixed(1);
      });

      row.appendChild(labelRow);
      row.appendChild(input);
      details.appendChild(row);
    }

    controlsRoot.appendChild(details);
  }

  // reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    Object.keys(boneDelta).forEach((name) => {
      boneDelta[name].x = 0;
      boneDelta[name].y = 0;
      boneDelta[name].z = 0;
      applyBonePose(name);
    });
    sliderEls.forEach((input) => {
      input.value = 0;
      input.dispatchEvent(new Event('input'));
    });
  });

  // ---------- fisheye (true wide-angle fisheye) toggle ----------
  const NORMAL_FOV = 38;
  let wideFov = 145;        // 魚眼時の取り込みFOV(強さスライダーで変更可)
  let isFisheyeOn = false;

  function setCameraFov(newFov){
    const oldHalfTan = Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2);
    camera.fov = newFov;
    camera.updateProjectionMatrix();
    const newHalfTan = Math.tan(THREE.MathUtils.degToRad(newFov) / 2);
    // FOVが変わると同じ距離でも被写体の見た目の大きさが変わるため、
    // tanの比でカメラ距離を補正し、見た目の大きさをできるだけ保つ
    camRadius = camRadius * (oldHalfTan / newHalfTan);
    camRadius = Math.max(minCamRadius, Math.min(5.0, camRadius));
    updateFisheyeUniforms();
    updateCamera();
  }

  const fisheyeBtn = document.getElementById('fisheyeBtn');
  const fisheyeStrengthRow = document.getElementById('fisheyeStrengthRow');
  const fisheyeStrengthInput = document.getElementById('fisheyeStrength');

  fisheyeBtn.addEventListener('click', () => {
    isFisheyeOn = fisheyeBtn.classList.toggle('active');
    fisheyeStrengthRow.style.display = isFisheyeOn ? 'flex' : 'none';
    if (isFisheyeOn) {
      minCamRadius = 0.18;
      setCameraFov(wideFov);
    } else {
      minCamRadius = 1.0;
      setCameraFov(NORMAL_FOV);
    }
  });

  fisheyeStrengthInput.addEventListener('input', () => {
    wideFov = Number(fisheyeStrengthInput.value);
    if (isFisheyeOn) setCameraFov(wideFov);
  });


  // ---------- fullscreen (hide panel) toggle ----------
  const appEl = document.getElementById('app');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  fullscreenBtn.addEventListener('click', () => {
    const isFull = appEl.classList.toggle('fullscreen');
    fullscreenBtn.classList.toggle('active', isFull);
    fullscreenBtn.textContent = isFull ? '一覧表示' : '全画面';
    // レイアウト変更後にビューポートのサイズへ追従させる
    requestAnimationFrame(() => {
      resize();
      updateCamera();
    });
  });

  function base64ToArrayBuffer(base64) {
    const binaryString = atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    return bytes.buffer;
  }

  const loader = new THREE.GLTFLoader();
  const modelBuffer = base64ToArrayBuffer(MODEL_BASE64);

  loader.parse(modelBuffer, '', (gltf) => {
    const model = gltf.scene;

    model.traverse((obj) => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = true;
        if (!obj.material || Array.isArray(obj.material) && obj.material.length === 0) {
          obj.material = new THREE.MeshStandardMaterial({ color: 0xf3e9dc, roughness: 0.85 });
        } else if (obj.material) {
          obj.material.roughness = 0.85;
          obj.material.metalness = 0.0;
          if (!obj.material.color || (obj.material.color.r === 1 && obj.material.color.g === 1 && obj.material.color.b === 1)) {
            obj.material.color = new THREE.Color(0xf3e9dc);
          }
        }
      }
      if (obj.isBone) {
        boneRefs[obj.name] = obj;
        restQuat[obj.name] = obj.quaternion.clone();
      }
    });

    root.add(model);

    loadingEl.classList.add('hidden');
  }, (err) => {
    console.error('Model load error:', err);
    loadingEl.textContent = '読み込みエラー';
  });

  // ---------- render loop ----------
  resize();
  updateCamera();

  function animate(){
    requestAnimationFrame(animate);
    if (isFisheyeOn) {
      renderer.setRenderTarget(fisheyeTarget);
      renderer.render(scene, camera);
      renderer.setRenderTarget(null);
      renderer.render(fisheyeScene, fisheyeCamera);
    } else {
      renderer.render(scene, camera);
    }
  }
  animate();
})();
